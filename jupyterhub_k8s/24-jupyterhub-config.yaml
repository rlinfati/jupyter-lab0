apiVersion: v1
kind: ConfigMap
metadata:
  name: jupyterhub-config
  namespace: jupyterhub-k8s
data:
  jupyterhub_config.py: |
    # jupyterhub_config.py

    import sys
    import os
    import socket
    import yaml

    c = get_config()

    c.JupyterHub.hub_bind_url = "http://" + socket.gethostbyname( socket.gethostname() ) + ":8001"
    c.JupyterHub.hub_connect_url = "http://jupyterhub-api.jupyterhub-k8s.svc.cluster.local:8001"
    c.JupyterHub.authenticator_class = "azuread"
    c.JupyterHub.spawner_class = "kubespawner.KubeSpawner"
    c.KubeSpawner.image_pull_policy = "IfNotPresent"
    c.JupyterHub.shutdown_on_logout = True

    c.Authenticator.admin_users = open("/etc/jupyterhub/secrets/AdminUsers").read().strip()
    c.OAuthenticator.oauth_callback_url = open("/etc/jupyterhub/secrets/OAuthCallBack").read().strip()
    c.OAuthenticator.client_id = open("/etc/jupyterhub/secrets/ClientID").read().strip()
    c.OAuthenticator.client_secret = open("/etc/jupyterhub/secrets/SecretID").read().strip()
    c.OAuthenticator.allow_all = True
    c.AzureAdOAuthenticator.tenant_id = open("/etc/jupyterhub/secrets/TenantID").read().strip()
    c.AzureAdOAuthenticator.username_claim = "email"

    c.KubeSpawner.storage_pvc_ensure = True
    c.KubeSpawner.delete_pvc = False
    c.KubeSpawner.storage_class = "jupyterhub-localpath-sc"
    c.KubeSpawner.pvc_name_template = "jupyterhub-{username}-work"
    c.KubeSpawner.storage_capacity = "8Gi"
    c.KubeSpawner.storage_extra_annotations = {"volumeType": "local"}

    c.KubeSpawner.volume_mounts = [
        {
            "name": "jupyterhub-user-{username}",
            "mountPath": "/home/jovyan/work",
        },
        {
            "name": "jupyterhub-gurobi",
            "mountPath": "/opt/gurobi/gurobi.lic",
            "subPath": "gurobi.lic",
        },
    ]
    c.KubeSpawner.volumes = [
        {
            "name": "jupyterhub-user-{username}",
            "persistentVolumeClaim": {"claimName": "jupyterhub-{username}-work"},
        },
        {
            "name": "jupyterhub-gurobi",
            "secret": {"secretName": "jupyterhub-gurobi"},
        },
    ]

    c.KubeSpawner.extra_container_config = { "envFrom": [ { "secretRef": { "name": "jupyterhub-ampl" } } ] }

    if os.path.exists("/proc/driver/nvidia/version") or os.path.exists("/sys/module/nvidia/version"):
        c.KubeSpawner.extra_pod_config = {
            "runtimeClassName": "nvidia",
        }

    with open("/etc/jupyterhub/profiles/jupyterhub_k8s_profiles_rlinfati.yaml") as f:
        PROFILE_RLINFATI = yaml.safe_load(f)

    with open("/etc/jupyterhub/profiles/jupyterhub_k8s_profiles_jupyter.yaml") as f:
        PROFILE_JUPYTER = yaml.safe_load(f)

    with open("/etc/jupyterhub/profiles/jupyterhub_k8s_profiles_cuda.yaml") as f:
        PROFILE_CUDA = yaml.safe_load(f)

    c.KubeSpawner.profile_list = [
        {
            "display_name": "(BestEffort) Jupyter/rlinfati/lab0 Notebook",
            **PROFILE_RLINFATI
        },
        {
            "display_name": "(BestEffort) Jupyter Notebook",
            **PROFILE_JUPYTER
        },
        {
            "display_name": "(BestEffort) CUDA Notebook - 1gpu",
            "kubespawner_override": {
                "extra_resource_limits": { "nvidia.com/gpu": "1" },
                "privileged": True,
                "allow_privilege_escalation": True,
            },
            **PROFILE_CUDA
        },
        {
            "display_name": "(Burstable) Jupyter/rlinfati/lab0 Notebook - 2cpu/15gb",
            "kubespawner_override": {
                "cpu_guarantee": 2,
                "mem_guarantee": "15G",
            },
            **PROFILE_RLINFATI
        },
        {
            "display_name": "(Guaranteed) Jupyter/rlinfati/lab0 Notebook - 2cpu/15gb",
            "kubespawner_override": {
                "cpu_limit": 2,
                "mem_limit": "15G",
            },
            **PROFILE_RLINFATI
        },
    ]

    c.JupyterHub.services = [ { "name": "jupyterhub-idle-culler-service",
                                "command": [sys.executable, "-m", "jupyterhub_idle_culler", "--timeout=43200"],
                                "admin": True } ]

    # eof
